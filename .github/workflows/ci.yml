name: CI

on:
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci || (rm package-lock.json && npm install)
          elif [ -f package.json ]; then
            npm install
          else
            echo "⚠️ No package.json found, skipping install"
          fi

      - name: Build
        id: build
        run: |
          if jq -e '.scripts.build' package.json &>/dev/null; then
            npm run build
          else
            echo "⚠️ No build script found, skipping"
          fi
        continue-on-error: true

      - name: Smoke tests (vitest)
        id: tests
        run: |
          if jq -e '.scripts.test' package.json &>/dev/null; then
            npm test
          else
            echo "⚠️ No test script found, skipping"
          fi
        continue-on-error: true

      - name: Typecheck
        id: typecheck
        run: |
          if jq -e '.scripts.typecheck' package.json &>/dev/null; then
            npm run typecheck 2>&1 | tee typecheck-output.txt
          else
            echo "⚠️ No typecheck script found, skipping"
          fi
        continue-on-error: true

      - name: Lint
        id: lint
        run: |
          if [ -f eslint.config.js ] || [ -f .eslintrc.js ] || [ -f .eslintrc.json ]; then
            npx eslint . -f json -o eslint-report.json || true
          else
            echo "⚠️ No eslint config found, skipping"
            echo '[]' > eslint-report.json
          fi

      - name: Check if CI failed
        if: always()
        run: |
          FAILED=0
          if [ "${{ steps.build.outcome }}" = "failure" ]; then echo "❌ Build failed"; FAILED=1; fi
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then echo "❌ Tests failed"; FAILED=1; fi
          if [ "${{ steps.typecheck.outcome }}" = "failure" ]; then echo "❌ Typecheck failed"; FAILED=1; fi
          if [ -f eslint-report.json ]; then
            ERRORS=$(node -e "const r=JSON.parse(require('fs').readFileSync('eslint-report.json','utf8')||'[]');console.log(r.reduce((a,f)=>a+(f.errorCount||0),0))")
            if [ "$ERRORS" -gt 0 ]; then echo "❌ $ERRORS lint error(s)"; FAILED=1; fi
          fi
          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "✅ CI passed"
